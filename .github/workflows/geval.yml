# Geval Decision Check - run `cargo test`, build release binary, evaluate example signals on PRs.

name: Geval Decision Check

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  geval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Test Geval
        run: cargo test --manifest-path geval/Cargo.toml

      - name: Build Geval
        run: cargo build --release --manifest-path geval/Cargo.toml

      - name: Generate signals
        run: |
          if [ -f geval/scripts/generate_signals.py ]; then
            python geval/scripts/generate_signals.py > signals.json
          else
            cp geval/examples/signals.json signals.json
          fi

      - name: Run Geval
        run: |
          ./geval/target/release/geval check \
            --contract geval/examples/contract.yaml \
            --contract geval/examples/contract-b.yaml \
            --signals signals.json \
            --env prod
        continue-on-error: true

      - name: Upload decision artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geval-decisions
          path: .geval/decisions/
          retention-days: 30
        continue-on-error: true
