# Build the Geval Rust binary and attach it to GitHub Releases.
# To release: push a tag like v0.1.0 (e.g. git tag v0.1.0 && git push origin v0.1.0).

name: Release Geval binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            artifact: geval-linux-x86_64
          - runner: macos-14
            artifact: geval-macos-aarch64
          - runner: macos-13
            artifact: geval-macos-x86_64
          - runner: windows-latest
            artifact: geval-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Build
        run: cargo build --release --manifest-path geval/Cargo.toml

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: cp geval/target/release/geval "${{ matrix.artifact }}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item geval/target/release/geval.exe -Destination "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
